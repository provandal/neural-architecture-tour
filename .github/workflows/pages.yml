name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build episode apps
        run: |
          set -e
          shopt -s nullglob
          for ep_dir in episodes/*/app; do
            [ -f "$ep_dir/package.json" ] || continue
            slug=$(basename "$(dirname "$ep_dir")")
            echo "::group::Building $slug"
            (cd "$ep_dir" && VITE_BASE_PATH="/neural-architecture-tour/${slug}/" pnpm build)
            echo "::endgroup::"
          done

      - name: Assemble site
        run: |
          set -e
          shopt -s nullglob
          mkdir -p dist
          cp -r landing/* dist/
          for ep_dir in episodes/*/app; do
            [ -d "$ep_dir/dist" ] || continue
            slug=$(basename "$(dirname "$ep_dir")")
            mkdir -p "dist/${slug}"
            cp -r "$ep_dir/dist/"* "dist/${slug}/"
            echo "Assembled $slug"
          done
          echo "--- dist tree ---"
          find dist -maxdepth 3 -type f | head -40

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
